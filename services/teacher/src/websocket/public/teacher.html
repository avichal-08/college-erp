<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher — Attendance</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.3rem; }
      #status { font-weight: 600; }
      form { display: grid; gap: .6rem; margin: 1rem 0; }
      label { display: grid; gap: .2rem; font-size: .85rem; }
      input, select { padding: .5rem; border: 1px solid #ccc; border-radius: 6px; }
      button { padding: .6rem; border: 0; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
      button.danger { background: #dc2626; padding: .3rem .6rem; font-size: .8rem; }
      button.accept { background: #16a34a; }
      button:disabled { opacity: .5; cursor: not-allowed; }
      .panel { border: 1px solid #e2e8f0; border-radius: 10px; padding: 1rem; margin: 1rem 0; }
      .student-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem 0; border-bottom: 1px solid #f1f5f9; }
      .student-row:last-child { border-bottom: none; }
      #log { font-family: monospace; font-size: .8rem; white-space: pre-wrap; background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 8px; max-height: 220px; overflow: auto; }
      .ok { color: #4ade80; }
      .err { color: #f87171; }
      .hidden { display: none; }
      .hint { font-size: .8rem; color: #64748b; }
    </style>
  </head>
  <body>
    <h1>Teacher — Attendance</h1>
    <div id="status">Connecting…</div>
    <p class="hint">Requires an <code>accessToken</code> cookie from auth-service — log in there first in this browser.</p>

    <form id="form">
      <label>Subject Offering ID<input id="subjectOfferingId" placeholder="uuid from subject_offerings" /></label>
      <label>Session Type
        <select id="sessionType">
          <option value="LECTURE">Lecture</option>
          <option value="LAB">Lab</option>
        </select>
      </label>
      <label>Session Date<input id="sessionDate" type="date" /></label>
      <label>Timetable Entry ID (optional)<input id="timetableEntryId" placeholder="uuid from timetable_entries" /></label>
      <button type="submit">Create Attendance</button>
    </form>

    <div id="sessionPanel" class="panel hidden">
      <h3 id="sessionTitle"></h3>
      <div id="students"></div>
      <p id="emptyState" class="hint">No one has clicked "Mark Attendance" yet.</p>
      <button id="acceptBtn" class="accept">Accept</button>
    </div>

    <div id="log"></div>

    <script>
      const ws = new WebSocket(`ws://${location.host}/ws`);
      const status = document.getElementById("status");
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const sessionPanel = document.getElementById("sessionPanel");
      const sessionTitle = document.getElementById("sessionTitle");
      const studentsEl = document.getElementById("students");
      const emptyState = document.getElementById("emptyState");
      const acceptBtn = document.getElementById("acceptBtn");
      const fields = ["subjectOfferingId", "sessionType", "sessionDate", "timetableEntryId"].reduce((acc, id) => {
        acc[id] = document.getElementById(id);
        return acc;
      }, {});

      let currentSessionId = null;

      const show = (text, kind) => {
        const line = document.createElement("div");
        line.className = kind || "";
        line.textContent = text;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
      };

      ws.onopen = () => (status.textContent = "Connected — waiting for server confirmation…");
      ws.onclose = () => {
        status.textContent = "Disconnected (not logged in? the server rejects the upgrade with 401 before any message is sent)";
      };
      ws.onerror = () => (status.textContent = "WebSocket error");

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === "connected") {
          status.textContent = `Connected as ${msg.payload.role}`;
        } else if (msg.type === "attendance_created") {
          currentSessionId = msg.payload.attendance.id;
          sessionTitle.textContent = `${msg.payload.attendance.subjectCode} — ${msg.payload.attendance.sessionType} (${msg.payload.attendance.sessionDate})`;
          sessionPanel.classList.remove("hidden");
          acceptBtn.disabled = false;
          acceptBtn.textContent = "Accept";
          renderStudents([]);
          show(`Session created: ${currentSessionId}`, "ok");
        } else if (msg.type === "pending_update") {
          if (msg.payload.sessionId === currentSessionId) {
            renderStudents(msg.payload.students);
          }
        } else if (msg.type === "attendance_accepted") {
          if (msg.payload.sessionId === currentSessionId) {
            acceptBtn.disabled = true;
            acceptBtn.textContent = "Accepted ✓";
            show(`Session ${currentSessionId} accepted and saved`, "ok");
          }
        } else if (msg.type === "error") {
          const extra = msg.payload.errors ? "\n - " + msg.payload.errors.join("\n - ") : "";
          show(`Error [${msg.payload.code}]: ${msg.payload.message}${extra}`, "err");
        }
      };

      function renderStudents(students) {
        studentsEl.innerHTML = "";
        emptyState.classList.toggle("hidden", students.length > 0);
        for (const s of students) {
          const row = document.createElement("div");
          row.className = "student-row";
          row.innerHTML = `<span>${s.name} <span class="hint">(${s.sectionRollNo})</span></span>`;
          const removeBtn = document.createElement("button");
          removeBtn.className = "danger";
          removeBtn.textContent = "Remove";
          removeBtn.onclick = () => {
            ws.send(JSON.stringify({
              type: "remove_student",
              payload: { sessionId: currentSessionId, studentId: s.studentId },
            }));
          };
          row.appendChild(removeBtn);
          studentsEl.appendChild(row);
        }
      }

      form.onsubmit = (e) => {
        e.preventDefault();
        const payload = {
          subjectOfferingId: fields.subjectOfferingId.value.trim(),
          sessionType: fields.sessionType.value,
          sessionDate: fields.sessionDate.value,
        };
        if (fields.timetableEntryId.value.trim()) {
          payload.timetableEntryId = fields.timetableEntryId.value.trim();
        }
        ws.send(JSON.stringify({ type: "create_attendance", payload }));
      };

      acceptBtn.onclick = () => {
        if (!currentSessionId) return;
        ws.send(JSON.stringify({ type: "accept_attendance", payload: { sessionId: currentSessionId } }));
      };
    </script>
  </body>
</html>
