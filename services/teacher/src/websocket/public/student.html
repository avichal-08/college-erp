<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student — Attendance</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.3rem; }
      #status { font-weight: 600; margin-bottom: 1rem; }
      .card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 1rem; margin: 1rem 0; }
      .card h3 { margin: 0 0 .4rem; }
      .meta { font-size: .85rem; color: #475569; }
      button { margin-top: .8rem; padding: .6rem 1rem; border: 0; border-radius: 6px; background: #16a34a; color: #fff; cursor: pointer; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      #log { font-family: monospace; font-size: .8rem; white-space: pre-wrap; background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 8px; max-height: 200px; overflow: auto; }
      .ok { color: #4ade80; }
      .err { color: #f87171; }
      .hint { font-size: .8rem; color: #64748b; }
    </style>
  </head>
  <body>
    <h1>Student — Attendance</h1>
    <div id="status">Connecting…</div>
    <p class="hint">Requires an <code>accessToken</code> cookie from auth-service — log in there first in this browser.</p>
    <div id="cards"></div>
    <div id="log"></div>

    <script>
      const ws = new WebSocket(`ws://${location.host}/ws`);
      const status = document.getElementById("status");
      const cards = document.getElementById("cards");
      const log = document.getElementById("log");

      const show = (text, kind) => {
        const line = document.createElement("div");
        line.className = kind || "";
        line.textContent = text;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
      };

      ws.onopen = () => (status.textContent = "Connected — waiting for server confirmation…");
      ws.onclose = () => {
        status.textContent = "Disconnected (not logged in? the server rejects the upgrade with 401 before any message is sent)";
      };
      ws.onerror = () => (status.textContent = "WebSocket error");

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === "connected") {
          status.textContent = `Connected as ${msg.payload.role}`;
        } else if (msg.type === "attendance_available") {
          renderCard(msg.payload.attendance);
        } else if (msg.type === "attendance_marked") {
          show(`Marked for session ${msg.payload.sessionId} — waiting for teacher to accept`, "ok");
          setCardState(msg.payload.sessionId, "marked");
        } else if (msg.type === "attendance_accepted") {
          show(`Session ${msg.payload.sessionId} finalized by teacher`, "ok");
          setCardState(msg.payload.sessionId, "accepted");
        } else if (msg.type === "error") {
          show(`Error [${msg.payload.code}]: ${msg.payload.message}`, "err");
        }
      };

      function renderCard(a) {
        if (document.getElementById("card-" + a.id)) return; // already shown
        const card = document.createElement("div");
        card.className = "card";
        card.id = "card-" + a.id;
        const where = a.classroom ? `${a.classroom}${a.startTime ? ` · ${a.startTime}–${a.endTime}` : ""}` : "";
        card.innerHTML = `
          <h3>${a.subjectCode} — ${a.subjectName} <span class="meta">(${a.sessionType})</span></h3>
          <div class="meta">${a.teacherName} · ${a.sessionDate}${where ? " · " + where : ""}</div>
          <button id="btn-${a.id}">Mark Attendance</button>
        `;
        cards.appendChild(card);
        document.getElementById("btn-" + a.id).onclick = () => {
          ws.send(JSON.stringify({ type: "mark_attendance", payload: { sessionId: a.id } }));
        };
      }

      function setCardState(sessionId, state) {
        const btn = document.getElementById("btn-" + sessionId);
        if (!btn) return;
        if (state === "marked") {
          btn.disabled = true;
          btn.textContent = "Marked ✓ — pending teacher review";
        } else if (state === "accepted") {
          btn.disabled = true;
          btn.textContent = "Finalized ✓";
        }
      }
    </script>
  </body>
</html>
